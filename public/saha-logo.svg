<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded-square emerald background (matches brand color #10b981 / #059669) -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Stylized "S" mark — heavy weight, geometric, white. -->
  <text
    x="50%"
    y="54%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="320"
    fill="#ffffff"
    letter-spacing="-12"
  >S</text>

  <!-- Court-line accent under the S — suggests a sports field. -->
  <rect x="176" y="408" width="160" height="14" rx="7" fill="#ffffff" opacity="0.85"/>
</svg>
